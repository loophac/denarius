{% extends "auth_base.html" %}
{% block title %}Set up | Denarius Console{% endblock %}
{% block content %}
  <h1 class="h4 mt-4 mb-1">Set up console access</h1>
  <p class="text-muted mb-4">Create the administrator for this local session.</p>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post" action="/register">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" class="form-control" maxlength="64" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" class="form-control" minlength="10" autocomplete="new-password" required>
      <small class="form-text text-muted">At least 10 characters</small>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Create access</button>
  </form>
{% endblock %}
