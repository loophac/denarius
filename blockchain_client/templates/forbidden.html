{% extends "auth_base.html" %}
{% block title %}Access restricted | Denarius Console{% endblock %}
{% block content %}
  <h1 class="h4 mt-4 mb-1">Access restricted</h1>
  <p class="text-muted mb-4">This area is reserved for the node administrator.</p>
  <a href="/wallets" class="btn btn-primary btn-block">Return to Wallets</a>
  <form method="post" action="/logout" class="mt-3 text-center">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button type="submit" class="btn btn-link">Sign out {{ username }}</button>
  </form>
{% endblock %}
