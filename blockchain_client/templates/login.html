{% extends "auth_base.html" %}
{% block title %}Sign in | Denarius Console{% endblock %}
{% block content %}
  <h1 class="h4 mt-4 mb-1">Sign in</h1>
  <p class="text-muted mb-4">Access your Denarius account.</p>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" class="form-control" maxlength="64" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" class="form-control" maxlength="256" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Sign in</button>
  </form>
  <p class="auth-switch">New to this node? <a href="/register">Create an account</a></p>
{% endblock %}
