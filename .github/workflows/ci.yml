name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Check dependency consistency
        run: python -m pip check
      - name: Run regression and integration tests
        run: python -m pytest

  package:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
      - name: Install build dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Build wheel and source archive
        run: python -m build
      - name: Install the built wheel
        run: python -c "import pathlib, subprocess, sys; wheel = next(pathlib.Path('dist').glob('*.whl')); subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', '--no-deps', str(wheel)])"
      - name: Smoke test installed commands
        run: |
          cd "$RUNNER_TEMP"
          denarius --help
          denarius-node --help
          denarius-console --help
          python -c "from importlib.resources import files; assert (files('blockchain_client') / 'templates' / 'base.html').is_file()"
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: denarius-package
          path: dist/*
          if-no-files-found: error

  release-quality:
    name: Release quality
    if: always()
    needs: [test, package]
    runs-on: ubuntu-latest
    steps:
      - name: Confirm required jobs passed
        if: needs.test.result != 'success' || needs.package.result != 'success'
        run: exit 1
      - name: Record successful result
        if: needs.test.result == 'success' && needs.package.result == 'success'
        run: echo "All release-quality checks passed."
